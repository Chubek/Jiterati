    structs:
      - name: BackendDatasetMetadata
        fields:
          - {name: target, type: std::string_view}
          - {name: dataset_arch, type: std::string_view}
          - {name: dataset_source, type: std::string_view}
          - {name: instruction_count, type: std::size_t}
          - {name: mnemonic_count, type: std::size_t}
    free_functions:
      - {name: backend_dataset_metadata_begin, signature: BackendDatasetMetadata const* backend_dataset_metadata_begin()}
      - {name: backend_dataset_metadata_end, signature: BackendDatasetMetadata const* backend_dataset_metadata_end()}
      - {name: find_backend_dataset_metadata, signature: BackendDatasetMetadata const* find_backend_dataset_metadata(std::string_view target)}
contracts:
  ownership:
    Module: owns Function instances
    Function: owns Block, Instruction, and Constant storage
    Block: references Function-owned Instruction objects
    CompiledFunction: owns executable/object memory when constructed with owned storage
    PassManager: owns Pass instances via std::unique_ptr
    LuaRuntime: owns an internal sol::state unless constructed from an external state reference
  validation:
    core_api: builder calls do not constitute full semantic validation
    ir_api: validate(TACFunction) and validate(TACModule) are the explicit validation boundary
    backend_api: callers should validate before compilation; compilers may revalidate when CompileOptions.verify_input is true
  determinism:
    serialization: to_string and str methods should emit deterministic text
    registries: lookup by exact string key
    backend_metadata: iteration order should be stable across a build
  error_model:
    parser: optional result plus diagnostics vector
    validation: diagnostics vector
    compiler: CompilationArtifact diagnostics plus ok()
    plugin_registry: missing version returns default PluginVersion
    macro_runtime: Lua/Sol2 errors propagate through script execution calls
cross_references:
  ir_language_spec: specs/IR.md
  ir_grammar: specs/IR.ebnf
  backend_spec: specs/backend-specs.yaml
  pass_spec: specs/passes-specs.yaml
  plugin_spec: specs/plugin-specs.yaml
  manual: docs/manual
