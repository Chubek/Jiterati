  ir_compiler:
    header: IR/ICompiler.hpp
    namespace: jiterati::ir
    enums:
      - name: ArtifactFormat
        values: [IRText, Assembly, Object, WasmBinary]
    structs:
      - name: CompileOptions
        fields:
          - {name: optimize_tac, type: bool, default: true}
          - {name: verify_input, type: bool, default: true}
          - {name: emit_comments, type: bool, default: true}
      - name: CompilationArtifact
        fields:
          - {name: target, type: std::string}
          - {name: format, type: ArtifactFormat, default: IRText}
          - {name: bytes, type: std::vector<std::uint8_t>}
          - {name: text, type: std::string}
          - {name: diagnostics, type: std::vector<Diagnostic>}
        methods:
          - {name: ok, signature: bool ok() const, semantics: false when any diagnostic has severity Error}
    classes:
      - name: ICompiler
        kind: abstract_interface
        methods:
          - {name: destructor, signature: virtual ~ICompiler() = default}
          - {name: target, signature: virtual std::string target() const = 0}
          - {name: format, signature: virtual ArtifactFormat format() const = 0}
          - {name: compile_tac, signature: "virtual CompilationArtifact compile(TACModule const& module, CompileOptions options = {}) = 0"}
          - {name: compile_terse, signature: "CompilationArtifact compile(TerseModule const& module, CompileOptions options = {})", semantics: lowers TerseModule to TACModule then delegates}
    factories:
      - {name: create_amd64_ir_compiler, signature: std::unique_ptr<ICompiler> create_amd64_ir_compiler()}
      - {name: create_aarch64_ir_compiler, signature: std::unique_ptr<ICompiler> create_aarch64_ir_compiler()}
      - {name: create_rv64_ir_compiler, signature: std::unique_ptr<ICompiler> create_rv64_ir_compiler()}
      - {name: create_wasm_ir_compiler, signature: std::unique_ptr<ICompiler> create_wasm_ir_compiler()}
  backend_metadata:
    header: BE/Metadata.hpp
